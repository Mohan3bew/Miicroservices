name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  identity-service-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ensure Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build and Test
        run: ./mvnw -B clean verify

      - name: Sonar Scan (optional)
        if: ${{ vars.SONAR_HOST_URL != '' && vars.SONAR_ORGANIZATION != '' && vars.SONAR_PROJECT_KEY != '' && secrets.SONAR_TOKEN != '' }}
        run: ./mvnw -B sonar:sonar -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }} -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }} -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: identity-service-jar
          path: services/identity-service/target/*.jar
