name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  identity-service-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Ensure Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Build and Test
        run: ./mvnw -B clean verify

      - name: Sonar Scan (optional)
        run: |
          if [ -z "${SONAR_HOST_URL:-}" ] || [ -z "${SONAR_ORGANIZATION:-}" ] || [ -z "${SONAR_PROJECT_KEY:-}" ] || [ -z "${SONAR_TOKEN:-}" ]; then
            echo "Sonar values are not fully configured. Skipping Sonar scan."
            exit 0
          fi
          ./mvnw -B sonar:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.organization="${SONAR_ORGANIZATION}" \
            -Dsonar.host.url="${SONAR_HOST_URL}" \
            -Dsonar.token="${SONAR_TOKEN}"
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload JAR
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: identity-service-jar
          path: services/identity-service/target/*.jar
