name: CD-Identity-Service

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "services/identity-service/**"
      - ".github/workflows/cd.yml"

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-marketplace-dev
  CONTAINER_APP_NAME: identity-service
  ACR_NAME: acrmarketplacedev1

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/identity-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build JAR
        run: mvn -B clean package -DskipTests

      - name: Publish JAR to Nexus (optional)
        if: ${{ vars.NEXUS_MAVEN_URL != '' && secrets.NEXUS_USERNAME != '' && secrets.NEXUS_PASSWORD != '' }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<'EOF'
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${env.NEXUS_USERNAME}</username>
                <password>${env.NEXUS_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF
          mvn -B deploy -DskipTests -DaltDeploymentRepository=nexus::default::${{ vars.NEXUS_MAVEN_URL }}
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name $ACR_NAME

      - name: Build and Push Image
        run: |
          IMAGE="$ACR_NAME.azurecr.io/identity-service:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Container Apps
        run: az containerapp update --name $CONTAINER_APP_NAME --resource-group $RESOURCE_GROUP --image $IMAGE
