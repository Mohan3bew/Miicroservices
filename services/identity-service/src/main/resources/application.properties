server.port=8080
spring.application.name=identity-service
management.endpoints.web.exposure.include=health,info

# Defaults use local H2 for quick local runs; override with PostgreSQL values in Container Apps.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:identitydb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
