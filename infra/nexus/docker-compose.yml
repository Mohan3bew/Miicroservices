services:
  nexus:
    image: sonatype/nexus3:3.85.0
    container_name: nexus3
    restart: unless-stopped
    ports:
      - "8082:8081"
    volumes:
      - nexus-data:/nexus-data
    environment:
      INSTALL4J_ADD_VM_PARAMS: "-Xms512m -Xmx1024m -XX:MaxDirectMemorySize=1024m"

volumes:
  nexus-data:
